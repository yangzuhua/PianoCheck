name: Build APK

on:
  workflow_dispatch:
  push:
    tags:
      - 'v*'

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install SDK packages & accept licenses
        run: |
          yes | sdkmanager --licenses
          sdkmanager "platforms;android-34" "build-tools;34.0.0"

      - name: Install Gradle 8.9
        run: |
          curl -sSL https://services.gradle.org/distributions/gradle-8.9-bin.zip -o /tmp/gradle.zip
          unzip -q /tmp/gradle.zip -d $HOME/gradle
          echo "$HOME/gradle/gradle-8.9/bin" >> "$GITHUB_PATH"

      - name: Debug env
        run: |
          echo "JAVA_HOME=$JAVA_HOME"
          echo "ANDROID_HOME=$ANDROID_HOME"
          which gradle
          gradle --version
          ls -la settings.gradle.kts build.gradle.kts app/build.gradle.kts
          echo "---"
          echo "PATH=$PATH"

      - name: Build release APK
        run: >
          gradle :app:assembleRelease
          --stacktrace
          --info
          -Dorg.gradle.daemon=false
          -Dorg.gradle.workers.max=2
        env:
          ANDROID_HOME: ${{ env.ANDROID_HOME }}
          JAVA_HOME: ${{ env.JAVA_HOME }}

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: piano-check-apk
          path: app/build/outputs/apk/release/app-release.apk
          if-no-files-found: error
